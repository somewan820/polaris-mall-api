name: api-ci-cd

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Run Go Tests
        run: go test ./...

  build-check:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"

      - name: Build
        run: go build ./...

  gate:
    runs-on: ubuntu-latest
    if: always()
    needs:
      - unit-test
      - build-check
    steps:
      - name: Enforce Gate
        run: |
          set -euo pipefail
          if [[ "${{ needs.unit-test.result }}" != "success" || \
                "${{ needs.build-check.result }}" != "success" ]]; then
            echo "Gate failed."
            exit 1
          fi
          echo "Gate passed."

  deploy-dev:
    runs-on: ubuntu-latest
    needs: gate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulate Dev Deploy
        run: |
          echo "Deploying API to dev..."
          echo "Replace this with real deploy command."
